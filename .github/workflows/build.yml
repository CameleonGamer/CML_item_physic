name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc: [ "1.21.1", "1.21.4" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download BBS CML Edition libs
        shell: pwsh
        run: ./scripts/download-bbs-libs.ps1

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build (${{ matrix.mc }})
        run: ./gradlew build -Pmc=${{ matrix.mc }} --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cml-item-physic-mc${{ matrix.mc }}
          path: build/libs/*+mc${{ matrix.mc }}.jar
